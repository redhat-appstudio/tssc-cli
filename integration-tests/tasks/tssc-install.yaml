---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tssc-install
spec:
  params:
    - name: ocp-login-command
      type: string
      description: ""
    - name: job-spec
      type: string
      description: "The job specification containing details of the test execution."
    - name: rhads-config
      type: string
      description: "The rhads-config file in string format."
    - name: tssc-image
      type: string
      description: "The tssc image containing the tssc binary."
    - name: install-params
      type: string
      description: "Additional parameters for installation testing (e.g., PRE_RELEASE=TAS TAS_VERSION=1.3.2). When empty, does not alter normal installation."
      default: ""
  volumes:
    - name: tssc-cli-volume
      secret:
        secretName: rhtap-cli-install
    - name: tssc-bin
      emptyDir: {}
  steps:
    - name: copy-tssc
      image: $(params.tssc-image)
      command: ["/bin/sh", "-c"]
      args: ["cp /usr/local/bin/tssc /tssc-bin/ && chmod +x /tssc-bin/tssc"]
      volumeMounts:
        - name: tssc-bin
          mountPath: /tssc-bin
    - name: install
      image: quay.io/konflux-ci/appstudio-utils:latest
      securityContext:
        runAsUser: 0
      env:
        - name: JOB_SPEC
          value: "$(params.job-spec)"
        - name: OCP_LOGIN_COMMAND
          value: "$(params.ocp-login-command)"
      volumeMounts:
        - name: tssc-cli-volume
          mountPath: /usr/local/rhtap-cli-install
        - name: tssc-bin
          mountPath: /usr/local/tssc-bin
      script: |
        #!/usr/bin/env bash
        set -o errexit
        set -o nounset
        set -o pipefail

        # # go-toolset image has make and go but not oc/kubectl; install cluster tools if missing
        # if ! command -v oc &>/dev/null; then
        #   command -v curl &>/dev/null || dnf install -y curl
        #   ARCH=$(uname -m)
        #   echo "Installing oc and kubectl for $ARCH..."
        #   curl -sL "https://mirror.openshift.com/pub/openshift-v4/${ARCH}/clients/ocp/stable/openshift-client-linux.tar.gz" | tar xz -C /tmp
        #   mv /tmp/oc /tmp/kubectl /usr/local/bin/
        # fi
        # for cmd in jq git; do
        #   if ! command -v $cmd &>/dev/null; then
        #     dnf install -y $cmd
        #   fi
        # done
        # if ! command -v yq &>/dev/null; then
        #   YQ_ARCH=$(uname -m)
        #   [[ "$YQ_ARCH" == "x86_64" ]] && YQ_ARCH="amd64" || true
        #   [[ "$YQ_ARCH" == "aarch64" ]] && YQ_ARCH="arm64" || true
        #   echo "Installing yq for $YQ_ARCH..."
        #   curl -sL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${YQ_ARCH}" -o /usr/local/bin/yq
        #   chmod +x /usr/local/bin/yq
        # fi

        GIT_REPO="${GIT_REPO:-$(echo "$JOB_SPEC" | jq -r '.git.repo // empty')}"
        if [ -z "$GIT_REPO" ]; then
          echo "[ERROR] GIT_REPO is not set in JOB_SPEC"
          exit 1
        fi

        # Clone the tssc-cli repository
        cd "$(mktemp -d)"

        if [[ "${GIT_REPO}" = "tssc-cli" ]]; then
            #GIT_URL="${GIT_URL:-$(echo "$JOB_SPEC" | jq -r '.git.source_repo_url')}"
            #GIT_REVISION="${GIT_REVISION:-$(echo "$JOB_SPEC" | jq -r '.git.commit_sha')}"
            GIT_URL="https://github.com/jkopriva/tssc-cli.git"
            GIT_REVISION="RHTAP-6123"
            echo -e "INFO: Cloning repository '$GIT_REPO' with revision '$GIT_REVISION' from URL '$GIT_URL'"
            git clone "${GIT_URL}" .
            git checkout "${GIT_REVISION}"
        else
            #echo -e "INFO: Cloning repository 'redhat-appstudio/tssc-cli' with revision 'main'"
            #git clone https://github.com/redhat-appstudio/tssc-cli.git .
            GIT_URL="https://github.com/jkopriva/tssc-cli.git"
            GIT_REVISION="RHTAP-6123"
            git clone "${GIT_URL}" .
            git checkout "${GIT_REVISION}"
        fi

        # Generate the .env file for tssc installation based on the configuration given in the rhads-config
        env_file="integration-tests/scripts/.ci-env"

        # Extract configuration items from rhads-config string
        RHADS_CONFIG_CONTENT="$(params.rhads-config)"
        ACS_CONFIG=$(echo "$RHADS_CONFIG_CONTENT" | tr ' ' '\n' | grep "^ACS=" | cut -d'=' -f2- | tr -d '"')
        TPA_CONFIG=$(echo "$RHADS_CONFIG_CONTENT" | tr ' ' '\n' | grep "^TPA=" | cut -d'=' -f2- | tr -d '"')
        REGISTRY_CONFIG=$(echo "$RHADS_CONFIG_CONTENT" | tr ' ' '\n' | grep "^REGISTRY=" | cut -d'=' -f2- | tr -d '"')
        SCM_CONFIG=$(echo "$RHADS_CONFIG_CONTENT" | tr ' ' '\n' | grep "^SCM=" | cut -d'=' -f2- | tr -d '"')
        PIPELINE_CONFIG=$(echo "$RHADS_CONFIG_CONTENT" | tr ' ' '\n' | grep "^PIPELINE=" | cut -d'=' -f2- | tr -d '"')
        AUTH_CONFIG=$(echo "$RHADS_CONFIG_CONTENT" | tr ' ' '\n' | grep "^AUTH_CONFIG=" | cut -d'=' -f2- | tr -d '"')

        # If AUTH_CONFIG is not set, use github as default
        if [[ -z "$AUTH_CONFIG" ]]; then
            AUTH_CONFIG="github"  # Default to github for all other cases
        fi

        echo "Extracted configuration values:"
        echo "  ACS: $ACS_CONFIG"
        echo "  TPA: $TPA_CONFIG"
        echo "  Registry: $REGISTRY_CONFIG"
        echo "  SCM: $SCM_CONFIG"
        echo "  Pipeline: $PIPELINE_CONFIG"
        echo "  Auth Config: $AUTH_CONFIG"

        # Export configuration values to .env file
        echo "export acs_config=\"$ACS_CONFIG\"" >> ${env_file}
        echo "export tpa_config=\"$TPA_CONFIG\"" >> ${env_file}
        echo "export registry_config=\"$REGISTRY_CONFIG\"" >> ${env_file}
        echo "export scm_config=\"$SCM_CONFIG\"" >> ${env_file}
        echo "export pipeline_config=\"$PIPELINE_CONFIG\"" >> ${env_file}
        echo "export auth_config=\"$AUTH_CONFIG\"" >> ${env_file}

        # Check if GIT_REPO is tssc-dev-multi-ci and update Developer Hub catalog url based on PR changes
        if [[ "${GIT_REPO}" = "tssc-dev-multi-ci" ]]; then
            GIT_REVISION="${GIT_REVISION:-$(echo "$JOB_SPEC" | jq -r '.git.commit_sha')}"
            GIT_URL="${GIT_URL:-$(echo "$JOB_SPEC" | jq -r '.git.source_repo_url')}"
            TEST_DH_CATALOG_URL="$GIT_URL/blob/$GIT_REVISION/samples/all.yaml"
            # Update DEVELOPER_HUB_CATALOG_URL value in .ci-env
            sed -i "s|^export DEVELOPER_HUB_CATALOG_URL.*|export DEVELOPER_HUB_CATALOG_URL=${TEST_DH_CATALOG_URL}|" "${env_file}"
        fi

        echo "INFO: .env file for tssc installation"
        cat ${env_file}
        # Deploy tssc
        source ${env_file}
        # Source install params if provided
        if [[ -n "$(params.install-params)" ]]; then
          echo "INFO: Sourcing install parameters: $(params.install-params)"
          eval "export $(params.install-params)"
        fi
        ./integration-tests/scripts/ci-oc-login.sh
        ./integration-tests/scripts/install.sh
