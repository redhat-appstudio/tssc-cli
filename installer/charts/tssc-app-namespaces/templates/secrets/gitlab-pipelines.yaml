{{- $secretObj := (lookup "v1" "Secret" .Release.Namespace "tssc-gitlab-integration") | default dict -}}
{{- $secretData := (get $secretObj "data") | default dict -}}
{{- if $secretData }}
  {{- range .Values.appNamespaces.namespace_prefixes }}
    {{- $namespace := . }}
---
kind: Secret
type: Opaque
apiVersion: v1
metadata:
  name: gitlab-pipelines-secret
  namespace: {{ $namespace }}-ci
data:
  webhook.secret: {{ $secretData.webhookSecret }}
  {{- end }}
{{- end }}
