{{- $tpa := .Values.trustedProfileAnalyzer -}}
{{- $protocol := "http" -}}
{{- if $tpa.openshift.useServiceCa }}
  {{- $protocol = "https" }}
{{- end }}
{{- $computedBombastic := printf "%s://server%s" $protocol $tpa.appDomain -}}
{{- $is := $tpa.integrationSecret | default dict -}}
{{- $bombastic := default $computedBombastic (index $is "bombastic_api_url") -}}
{{- $cyclone := coalesce (index $is "supported_cyclonedx_version") $tpa.cycloneDXVersion "1.4" -}}
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app: trustedprofileanalyzer
  # Match Helm release namespace so meta.helm.sh/release-namespace stays valid when
  # switching product ↔ integration bundle (chart uses install-release-in-installer-namespace).
  namespace: {{ .Release.Namespace }}
  name: tssc-trustification-integration
type: Opaque
stringData:
  bombastic_api_url: {{ $bombastic | quote }}
  supported_cyclonedx_version: {{ $cyclone | quote }}
